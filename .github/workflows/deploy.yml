name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: DynamicUI/package-lock.json


      - name: Install dependencies
        working-directory: DynamicUI
        run: npm ci

      - name: Build
        working-directory: DynamicUI
        run: npm run build -- --configuration production --base-href "/Nix-Showcase/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: DynamicUI/dist/dynamic-controller/browser

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: Copy index to 404 fallback
        run: cp DynamicUI/dist/dynamic-controller/browser/index.html DynamicUI/dist/dynamic-controller/browser/404.html